name: CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build-and-test:
    name: Compilar y probar
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Dar permisos de ejecución a gradlew
        run: chmod +x gradlew

      - name: Compilar y correr pruebas
        run: ./gradlew build --no-daemon

      - name: Subir reporte de pruebas
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: build/reports/tests/test

  vulnerabilidades-criticas:
    name: Vulnerabilidades críticas (OWASP Dependency-Check)
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Dar permisos de ejecución a gradlew
        run: chmod +x gradlew

      # Falla el job si aparece una vulnerabilidad con CVSS >= 9.0 (CRÍTICA).
      # Necesita el secret NVD_API_KEY (gratis: https://nvd.nist.gov/developers/request-an-api-key)
      # configurado en Settings > Secrets and variables > Actions del repo.
      - name: Analizar dependencias
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: ./gradlew dependencyCheckAnalyze --no-daemon

      - name: Subir reporte de dependencias
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: build/reports/dependency-check-report.html

  secretos-expuestos:
    name: Detección de secretos (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código (con historial completo)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Escanea todo el historial de git en busca de tokens, contraseñas, claves, etc.
      # Falla el job (exit-code 1) si encuentra algo.
      - name: Escanear secretos con Gitleaks
        run: |
          docker run --rm -v ${{ github.workspace }}:/repo zricethezav/gitleaks:latest \
            detect --source /repo -v --exit-code 1
